<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="부동산 사주 — 천명으로 보는 나의 부동산 운세">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="부동산 사주">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>부동산 사주 — 不動産四柱</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #0D0804;
      margin: 0;
      overflow: hidden;
    }
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      background: linear-gradient(to bottom, #1A0A05, #0D0804);
    }
    #loading h1 {
      color: #C8921A;
      font-size: 24px;
      letter-spacing: 8px;
      font-family: serif;
      margin-top: 20px;
    }
    #loading p {
      color: #9A7840;
      font-size: 12px;
      letter-spacing: 2px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>不動産四柱</h1>
    <p>부동산 사주 로딩 중...</p>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      document.getElementById('loading').style.display = 'none';
    });
  </script>
</body>
</html>
