name: real_estate_luck_in_saju
description: Real Estate Luck in Saju - 내 사주로 보는 부동산 운세
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # 상태관리
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  # 로컬 저장소
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # 차트
  fl_chart: ^0.68.0
  # 달력
  table_calendar: ^3.1.2
  # 애니메이션
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  # 공유/PDF
  share_plus: ^9.0.0
  screenshot: ^3.0.0
  # 백엔드 (Firebase REST)
  http: ^1.2.1
  shared_preferences: ^2.2.3
  crypto: ^3.0.3
  # URL 열기
  url_launcher: ^6.3.0
  # 로컬 푸시 알림
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  # 지도
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  # 유틸
  intl: ^0.19.0
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
  fonts:
    - family: NotoSerifKR
      fonts:
        - asset: assets/fonts/NotoSerifKR-Regular.ttf
        - asset: assets/fonts/NotoSerifKR-Bold.ttf
          weight: 700
